name: Build Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_VERSION: "1.0.1"

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-deb-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-deb-

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Build deb package
        run: cargo tauri build --bundles deb

      - uses: actions/upload-artifact@v4
        with:
          name: ofl-deb
          path: src-tauri/target/release/bundle/deb/*.deb

  build-rpm:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev pkg-config rpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-rpm-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-rpm-

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Build rpm package
        run: cargo tauri build --bundles rpm

      - uses: actions/upload-artifact@v4
        with:
          name: ofl-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm

  build-arch:
    runs-on: ubuntu-24.04
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm rust cargo webkit2gtk-4.1 gtk3 \
            libayatana-appindicator librsvg openssl pkg-config

      - name: Build with makepkg
        run: |
          useradd -m builder
          chown -R builder:builder .
          su builder -c "cd packaging && makepkg -sf --noconfirm"

      - uses: actions/upload-artifact@v4
        with:
          name: ofl-arch
          path: packaging/*.pkg.tar.zst

  build-binary:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-binary-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-binary-

      - name: Build release binary
        run: cargo build --release --manifest-path src-tauri/Cargo.toml

      - name: Package binary tarball
        run: |
          PKGDIR="ofl-${APP_VERSION}-linux-x86_64"
          mkdir -p build/${PKGDIR}

          cp src-tauri/target/release/ofl build/${PKGDIR}/
          cp data/ofl.svg build/${PKGDIR}/
          cp data/ofl-app.svg build/${PKGDIR}/
          cp data/ofl.desktop build/${PKGDIR}/
          cp LICENSE build/${PKGDIR}/ 2>/dev/null || true
          cp README.md build/${PKGDIR}/ 2>/dev/null || true

          cd build
          tar czf ${PKGDIR}.tar.gz ${PKGDIR}/

      - uses: actions/upload-artifact@v4
        with:
          name: ofl-binary
          path: build/ofl-*-linux-x86_64.tar.gz

  release:
    needs: [build-deb, build-rpm, build-arch, build-binary]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -n 2 | tail -n 1 || true)
          TAG=${GITHUB_REF#refs/tags/}

          echo "## What's Changed in ${TAG}" > changelog.md
          echo "" >> changelog.md

          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG" ]; then
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges >> changelog.md
          else
            git log --pretty=format:"- %s (%h)" --no-merges >> changelog.md
          fi

          echo "" >> changelog.md
          echo "" >> changelog.md
          echo "### Packages" >> changelog.md
          echo "| Format | File |" >> changelog.md
          echo "|--------|------|" >> changelog.md
          echo "| Debian/Ubuntu | \`ofl_${APP_VERSION}_amd64.deb\` |" >> changelog.md
          echo "| Fedora/RHEL | \`ofl-${APP_VERSION}-1.*.rpm\` |" >> changelog.md
          echo "| Arch Linux | \`ofl-${APP_VERSION}-1-x86_64.pkg.tar.zst\` |" >> changelog.md
          echo "| Portable binary | \`ofl-${APP_VERSION}-linux-x86_64.tar.gz\` |" >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: |
            artifacts/ofl-deb/*.deb
            artifacts/ofl-rpm/*.rpm
            artifacts/ofl-arch/*.pkg.tar.zst
            artifacts/ofl-binary/*.tar.gz
          fail_on_unmatched_files: false
